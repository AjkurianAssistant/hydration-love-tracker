<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydration Love 💧</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.css">
</head>
<body>
    <div class="background-animation"></div>

    <div class="container">
        <header>
            <h1>Hydration Love</h1>
            <p class="subtitle">For my love ❤️</p>
        </header>

        <section class="bottle-status">
            <div class="bottle-indicator">
                <span class="bottle-emoji">🥤</span>
                <div class="bottle-info">
                    <span id="bottle-count">Bottle 0 of 5</span>
                    <span id="bottle-percentage" class="percentage">0%</span>
                </div>
            </div>
            <div class="remaining" id="remaining">Remaining: 5 bottles (84.5 oz)</div>
        </section>

        <section class="progress-section glass-card">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="wave"></div>
            </div>
        </section>

        <!-- Water Bottle Visualization -->
        <section class="bottle-visual glass-card">
            <div class="water-bottle" id="water-bottle">
                <div class="bottle-cap"></div>
                <div class="bottle-neck"></div>
                <div class="bottle-body">
                    <div class="water-level" id="water-level"></div>
                    <div class="water-bubbles" id="water-bubbles"></div>
                </div>
                <div class="bottle-base"></div>
            </div>
            <div class="bottle-stats">
                <span id="current-bottle-label">Bottle 1 of 5</span>
                <span id="current-oz-label">0.0 / 16.9 oz</span>
            </div>
        </section>

        <section class="message-section">
            <div class="short-message glass-card" id="message-card">
                <p id="short-message">Take your first sip! 💕</p>
            </div>
            <div class="daily-progress glass-card">
                <div class="daily-header">
                    <span>Daily Message</span>
                    <span id="daily-progress-text">0/30 words</span>
                </div>
                <div class="daily-message" id="daily-message">
                    <p id="daily-text">Complete drinks to reveal today's message...</p>
                </div>
            </div>
        </section>

        <section class="actions-section">
            <button class="drink-btn btn-sip glass-card" id="btn-sip">
                <span class="btn-emoji">💧</span>
                <span class="btn-text">Sip</span>
                <span class="btn-amount">+0.5 oz</span>
            </button>

            <button class="drink-btn btn-bottle glass-card" id="btn-bottle">
                <span class="btn-emoji">✅</span>
                <span class="btn-text">Bottle Done</span>
                <span class="btn-amount">+16.9 oz</span>
            </button>
        </section>

        <section class="history-section glass-card">
            <h2>Today's Drinks</h2>
            <div class="history-list" id="history-list">
                <p class="empty-state">No drinks yet today</p>
            </div>
        </section>

        <section class="week-section glass-card">
            <h2>This Week</h2>
            <canvas id="week-chart"></canvas>
        </section>
    </div>

    <!-- Ceremony Overlay -->
    <div class="ceremony-overlay" id="ceremony-overlay">
        <div class="ceremony-content glass-card">
            <div class="ceremony-message" id="ceremony-message"></div>
            <button class="btn-replay" id="btn-replay">Replay</button>
            <button class="btn-close-ceremony" id="btn-close-ceremony">Continue</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
