<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydration Love 💧</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.css">
</head>
<body>
    <div class="background-animation"></div>

    <div class="container">
        <header>
            <h1>Hydration Love</h1>
            <p class="subtitle">For my love ❤️</p>
        </header>

        <!-- Actions at the top - no scrolling! -->
        <section class="actions-section">
            <button class="drink-btn btn-sip glass-card" id="btn-sip">
                <span class="btn-emoji">💧</span>
                <span class="btn-text">Sip</span>
                <span class="btn-amount">+0.5 oz</span>
            </button>
        </section>

        <section class="progress-section glass-card">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="wave"></div>
            </div>
        </section>

        <!-- Water Bottle Visualization -->
        <section class="bottle-visual glass-card">
            <div class="water-bottle" id="water-bottle">
                <div class="bottle-cap"></div>
                <div class="bottle-neck"></div>
                <div class="bottle-body">
                    <div class="water-level" id="water-level"></div>
                    <div class="water-bubbles" id="water-bubbles"></div>
                </div>
                <div class="bottle-base"></div>
            </div>
            <div class="bottle-stats">
                <span id="bottle-label">Bottle 1 of 5</span>
                <span id="oz-label">16.9 oz remaining</span>
            </div>
        </section>

        <section class="message-section">
            <div class="short-message glass-card" id="message-card">
                <p id="short-message">Take your first sip! 💕</p>
            </div>
        </section>

        <section class="history-section glass-card">
            <h2>Today's Drinks</h2>
            <div class="history-list" id="history-list">
                <p class="empty-state">No drinks yet today</p>
            </div>
        </section>

        <section class="week-section glass-card">
            <h2>This Week</h2>
            <canvas id="week-chart"></canvas>
        </section>

        <div class="settings-section">
            <button class="settings-btn" id="settings-btn">⚙️</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h3>Settings</h3>
            <p class="info-text">Hydration Love Tracker</p>
            <p class="info-text">All data stored locally on this device</p>
            <div class="modal-stats">
                <p>Today's drinks: <span id="modal-drink-count">0</span></p>
                <p>Current bottle: <span id="modal-bottle-info">1 of 5</span></p>
            </div>
            <button class="btn-reset" id="btn-reset">Reset All Data</button>
            <button class="btn-close-modal" id="btn-close-modal">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
