<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydration Love 💧</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💧 Hydration Love</h1>
            <p class="subtitle">For my love ❤️</p>
        </header>

        <section class="progress-section">
            <div class="progress-header">
                <span id="current-bottles">0</span>/5 bottles
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="remaining" id="remaining">Remaining: 5 bottles</p>
        </section>

        <section class="message-section">
            <div class="message-card" id="message-card">
                <p id="short-message">Take your first sip! 💕</p>
            </div>
            <div class="daily-message" id="daily-message">
                <p id="daily-text">Complete drinks to reveal today's message...</p>
            </div>
        </section>

        <section class="upload-section">
            <div class="upload-area" id="upload-area">
                <input type="file" id="image-input" accept="image/*" capture="environment">
                <div class="upload-content">
                    <svg class="bottle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
                        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"></path>
                        <line x1="6" y1="1" x2="6" y2="4"></line>
                        <line x1="10" y1="1" x2="10" y2="4"></line>
                        <line x1="14" y1="1" x2="14" y2="4"></line>
                    </svg>
                    <p>Tap to upload bottle photo</p>
                    <span class="hint">AI will estimate how much you drank</span>
                </div>
                <img id="preview" class="preview hidden">
            </div>
            <button class="btn-primary" id="submit-btn" disabled>Submit</button>
        </section>

        <section class="history-section">
            <h2>Today's Log</h2>
            <div class="history-list" id="history-list">
                <p class="empty-state">No drinks logged yet today</p>
            </div>
        </section>

        <section class="week-section">
            <h2>This Week</h2>
            <canvas id="week-chart"></canvas>
        </section>

        <div class="settings-btn" id="settings-btn">⚙️</div>

        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <h3>Settings</h3>
                <label>OpenRouter API Key:
                    <input type="password" id="api-key" placeholder="sk-or-...">
                </label>
                <p class="hint">Get free key at <a href="https://openrouter.ai" target="_blank">openrouter.ai</a></p>
                <div class="modal-buttons">
                    <button class="btn-secondary" id="save-settings">Save</button>
                    <button class="btn-secondary" id="close-modal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
